name: Auto Decompile QQ APK

on:
  workflow_dispatch: # 支持手动点击按钮触发，并提供可选项
    inputs:
      decompile_all:
        description: '是否完整反编译整个 APK (注意：产物文件极大，耗时较长)'
        required: true
        type: boolean
        default: false
      decompile_mobileqq:
        description: '是否反编译 com.tencent.mobileqq (非完整反编译时生效)'
        required: true
        type: boolean
        default: true
      decompile_qqnt:
        description: '是否反编译 com.tencent.qqnt (非完整反编译时生效)'
        required: true
        type: boolean
        default: true

jobs:
  decompile:
    runs-on: ubuntu-latest

    steps:
      # ==========================================
      # 1. 优先清理磁盘空间（防止大文件溢出）
      # ==========================================
      - name: Free Disk Space (Cleanup)
        run: |
          echo "Before cleanup disk space:"
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          echo "After cleanup disk space:"
          df -h

      # ==========================================
      # 2. 开启 8GB Swap 虚拟内存（防止 JADX 的 JVM 内存溢出）
      # ==========================================
      - name: Create 8GB Swap Space
        run: |
          echo "=== 开启 Swap 前内存状态 ==="
          free -h
          
          # 创建并挂载 8GB Swap，为大规模全局分析保驾护航
          sudo swapoff -a
          sudo fallocate -l 8G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          
          echo "=== 开启 Swap 后内存状态 ==="
          free -h

      # ==========================================
      # 3. 基础环境准备
      # ==========================================
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download APK from Custom Link
        run: |
          mkdir -p workspace
          cd workspace
          echo "Downloading APK..."
          curl -L "https://downv6.qq.com/qqweb/QQ_1/android_apk/9.3.10_3b553a3ebc174e67.apk" -o target.apk
          echo "Download finished. File info:"
          du -sh target.apk

      # ==========================================
      # 4. 安装 JADX 工具
      # ==========================================
      - name: Install JADX
        run: |
          mkdir -p bin
          
          JADX_VERSION=$(curl -s https://api.github.com/repos/skylot/jadx/releases/latest | grep '"tag_name":' | sed -E 's/.*"v([^"]+)".*/\1/')
          curl -L "https://github.com/skylot/jadx/releases/download/v${JADX_VERSION}/jadx-${JADX_VERSION}.zip" -o jadx.zip
          unzip -d bin/jadx jadx.zip
          
          # 递归赋予 JADX 目录下所有的脚本可执行权限
          chmod -R +x bin/jadx/bin
          
          echo "$GITHUB_WORKSPACE/bin/jadx/bin" >> $GITHUB_PATH

      # ==========================================
      # 5. 提取所有 DEX 文件并全局反编译 (避开加密 Assets 且保障跨 DEX 引用无损)
      # ==========================================
      - name: Decompile APK
        run: |
          cd workspace
          mkdir -p java_final
          
          # 5.1 仅仅提取所有的 classes*.dex 文件到临时目录，彻底跳过 assets
          echo "Only extracting classes*.dex files from target.apk..."
          unzip -q target.apk "classes*.dex" -d dex_extracted
          
          # 5.2 检查并组装过滤参数
          FILTER=""
          if [ "${{ inputs.decompile_all }}" = "false" ]; then
            if [ "${{ inputs.decompile_mobileqq }}" = "true" ] && [ "${{ inputs.decompile_qqnt }}" = "true" ]; then
              FILTER="com.tencent.mobileqq,com.tencent.qqnt"
            elif [ "${{ inputs.decompile_mobileqq }}" = "true" ]; then
              FILTER="com.tencent.mobileqq"
            elif [ "${{ inputs.decompile_qqnt }}" = "true" ]; then
              FILTER="com.tencent.qqnt"
            else
              echo "Error: No packages selected for decompilation!"
              exit 1
            fi
          fi
          
          # 5.3 显式允许 JVM 使用 12GB 的堆内存，让 Java 充分调度我们配置的 Swap 虚拟空间
          export JAVA_OPTS="-Xmx12g"
          echo "JVM memory limit set to 12G"
          
          # 5.4 一起传入所有提取出的 dex 路径进行全局反编译
          if [ -n "$FILTER" ]; then
            echo "局部反编译模式: 载入完整 DEX 上下文，但仅输出: $FILTER"
            jadx -d java_final --no-res --threads-count 2 --show-only "$FILTER" dex_extracted/*.dex
          else
            echo "完整反编译模式: 正在反编译整个 APK... (预计耗时 1~3 小时，请耐心等待)"
            jadx -d java_final --no-res --threads-count 2 dex_extracted/*.dex
          fi
          
          # 5.5 反编译结束，立即清理掉占空间的临时 dex_extracted 目录
          rm -rf dex_extracted

      # ==========================================
      # 6. 打包与上传产物 (仅打包 Java 源码)
      # ==========================================
      - name: Zip Decompiled Files
        run: |
          cd workspace
          # 检查 java_final 目录下是否有实际生成的内容
          if [ -d "java_final" ] && [ "$(ls -A java_final)" ]; then
            echo "Zipping Java output..."
            mv java_final decompiled_java
            zip -r java_output.zip decompiled_java
          else
            echo "No files decompiled. Creating a fallback readme file."
            mkdir -p decompiled_java
            echo "No package selection was made or no code was found." > decompiled_java/readme.txt
            zip -r java_output.zip decompiled_java
          fi

      - name: Upload Decoupled Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qq-decompiled-java
          path: workspace/java_output.zip
          retention-days: 7 # 产物在 GitHub 保留 7 天
