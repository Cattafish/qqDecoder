name: Auto Decompile QQ APK

on:
  schedule:
    - cron: '0 0 * * *' # 每天北京时间早上 8:00 (UTC 0:00) 自动执行检测
  workflow_dispatch: # 支持手动点击按钮触发，并提供可选项
    inputs:
      decompile_all:
        description: '是否完整反编译整个 APK (注意：产物文件极大，耗时较长)'
        required: true
        type: boolean
        default: false
      decompile_mobileqq:
        description: '是否反编译 com.tencent.mobileqq (非完整反编译时生效)'
        required: true
        type: boolean
        default: true
      decompile_qqnt:
        description: '是否反编译 com.tencent.qqnt (非完整反编译时生效)'
        required: true
        type: boolean
        default: true

jobs:
  decompile:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须具有写权限，以便向仓库推送文件和创建 Release

    steps:
      # ==========================================
      # 1. 基础环境准备
      # ==========================================
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ==========================================
      # 2. 自动检测 QQ 是否有新版本更新（含 Beta & 版本号智能提取）
      # ==========================================
      - name: Check for QQ Update
        id: check_update
        run: |
          echo "=== 正在从 Telegram 获取最新 QQ APK 及版本信息 ==="
          
          # 使用 Python 脚本精准抓取 TG 最新消息块，解析链接、版本号及 Beta 标记
          python3 - << 'EOF'
          import urllib.request
          import re
          import os

          url = "https://t.me/s/qq_updatelog"
          req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64)'})
          
          try:
              html = urllib.request.urlopen(req).read().decode('utf-8')
          except Exception as e:
              print(f"Error fetching TG channel: {e}")
              exit(1)

          # 按 TG 消息块切割
          messages = html.split('class="tgme_widget_message_wrap')
          
          latest_apk_url = None
          latest_msg_text = ""

          # 从最新的消息倒序查找包含下载直链的消息
          for msg in reversed(messages):
              urls = re.findall(r'https://downv6\.qq\.com/qqweb/QQ_1/android_apk/[a-zA-Z0-9_.-]+\.apk', msg)
              if urls:
                  latest_apk_url = urls[-1]
                  latest_msg_text = msg
                  break

          if not latest_apk_url:
              print("错误: 未能在 Telegram 频道找到有效的 APK 下载链接。")
              exit(1)

          # 1. 检测是否包含 #beta 或 #Beta
          is_beta = "true" if re.search(r'#beta', latest_msg_text, re.IGNORECASE) else "false"

          # 2. 提取版本号（优先提取形如 QQ_NT 9.3.30.39270 或数字版本号，若无则使用哈希文件名）
          ver_match = re.search(r'QQ(?:_NT)?\s+([0-9.]+)', latest_msg_text, re.IGNORECASE)
          if not ver_match:
              ver_match = re.search(r'\b([0-9]+\.[0-9]+\.[0-9]+(?:\.[0-9]+)?)\b', latest_msg_text)

          filename = latest_apk_url.split('/')[-1].replace('.apk', '')

          if ver_match:
              version_short = ver_match.group(1)
          else:
              # 降级方案：从文件名获取
              version_short = filename.split('_')[0]

          # 写入 Github Output 供后续 Step 读取
          github_output = os.environ.get('GITHUB_OUTPUT')
          with open(github_output, 'a', encoding='utf-8') as f:
              f.write(f"apk_url={latest_apk_url}\n")
              f.write(f"version_short={version_short}\n")
              f.write(f"version_full={filename}\n")
              f.write(f"is_beta={is_beta}\n")

          print(f"检测成功!")
          print(f"下载直链: {latest_apk_url}")
          print(f"版本号: {version_short}")
          print(f"是否为 Beta 版: {is_beta}")
          EOF

          LATEST_URL="${{ steps.check_update.outputs.apk_url }}"
          
          # 读取本地记录的上一次版本链接
          OLD_URL=""
          if [ -f "latest_version.txt" ]; then
            OLD_URL=$(cat latest_version.txt)
          fi
          echo "Old URL recorded: $OLD_URL"

          # 比较版本是否有变化或为手动触发
          if [ "$LATEST_URL" != "$OLD_URL" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "has_update=true" >> $GITHUB_OUTPUT
            echo "$LATEST_URL" > latest_version.txt
          else
            echo "has_update=false" >> $GITHUB_OUTPUT
            echo "No update detected."
          fi

      # ==========================================
      # 3. 如果有更新，将最新版本记录推送回仓库
      # ==========================================
      - name: Commit and Push Version Update
        if: steps.check_update.outputs.has_update == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add latest_version.txt
          git commit -m "Auto-update QQ APK version record [skip ci]" || echo "No changes to commit"
          git push

      # ==========================================
      # 4. 【自适应逻辑】优先清理磁盘空间并检测最优存储路径
      # ==========================================
      - name: Free Disk Space (Cleanup) & Detect Best Drive
        if: steps.check_update.outputs.has_update == 'true'
        run: |
          echo "=== 磁盘清理前状态 ==="
          df -h
          
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          
          echo "=== 磁盘清理后状态 ==="
          df -h
          
          MNT_AVAIL=$(df -k /mnt 2>/dev/null | tail -n 1 | awk '{print $4}')
          ROOT_AVAIL=$(df -k / 2>/dev/null | tail -n 1 | awk '{print $4}')
          
          if [ -z "$MNT_AVAIL" ]; then
            MNT_AVAIL=0
          fi
          
          if [ "$MNT_AVAIL" -gt "$ROOT_AVAIL" ]; then
            echo "TARGET_DIR=/mnt" >> $GITHUB_ENV
            echo "自适应检测结果：使用 /mnt 作为主缓存与交换区。"
          else
            echo "TARGET_DIR=" >> $GITHUB_ENV
            echo "自适应检测结果：使用主根目录 (/) 作为主缓存与交换区。"
          fi

      # ==========================================
      # 5. 【自适应】开启 32GB Swap 虚拟内存
      # ==========================================
      - name: Create 32GB Swap Space
        if: steps.check_update.outputs.has_update == 'true'
        run: |
          if [ "${{ env.TARGET_DIR }}" = "/mnt" ]; then
            SWAP_PATH="/mnt/swapfile"
          else
            SWAP_PATH="/swapfile"
          fi
          
          sudo swapoff -a || true
          sudo fallocate -l 32G $SWAP_PATH
          sudo chmod 600 $SWAP_PATH
          sudo mkswap $SWAP_PATH
          sudo swapon $SWAP_PATH
          free -h

      # ==========================================
      # 6. 基础环境准备
      # ==========================================
      - name: Set up JDK 17
        if: steps.check_update.outputs.has_update == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ==========================================
      # 7. 下载 APK
      # ==========================================
      - name: Download APK from Latest Link
        if: steps.check_update.outputs.has_update == 'true'
        run: |
          if [ "${{ env.TARGET_DIR }}" = "/mnt" ]; then
            REAL_WORKSPACE="/mnt/workspace"
            sudo mkdir -p $REAL_WORKSPACE
            sudo chown -R runner:runner $REAL_WORKSPACE
          else
            REAL_WORKSPACE="$GITHUB_WORKSPACE/workspace_real"
            mkdir -p $REAL_WORKSPACE
          fi
          
          rm -rf workspace || true
          ln -sf $REAL_WORKSPACE workspace
          
          cd workspace
          echo "Downloading APK from: ${{ steps.check_update.outputs.apk_url }}"
          curl -L "${{ steps.check_update.outputs.apk_url }}" -o target.apk
          du -sh target.apk

      # ==========================================
      # 8. 安装 JADX 工具
      # ==========================================
      - name: Install JADX
        if: steps.check_update.outputs.has_update == 'true'
        run: |
          mkdir -p bin
          JADX_VERSION=$(curl -s https://api.github.com/repos/skylot/jadx/releases/latest | grep '"tag_name":' | sed -E 's/.*"v([^"]+)".*/\1/')
          curl -L "https://github.com/skylot/jadx/releases/download/v${JADX_VERSION}/jadx-${JADX_VERSION}.zip" -o jadx.zip
          unzip -d bin/jadx jadx.zip
          chmod -R +x bin/jadx/bin
          echo "$GITHUB_WORKSPACE/bin/jadx/bin" >> $GITHUB_PATH

      # ==========================================
      # 9. 执行反编译
      # ==========================================
      - name: Decompile APK
        if: steps.check_update.outputs.has_update == 'true'
        run: |
          cd workspace
          mkdir -p java_final
          
          echo "Only extracting classes*.dex files from target.apk..."
          unzip -q target.apk "classes*.dex" -d dex_extracted
          
          FILTER=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.decompile_all }}" = "false" ]; then
            if [ "${{ inputs.decompile_mobileqq }}" = "true" ] && [ "${{ inputs.decompile_qqnt }}" = "true" ]; then
              FILTER="com.tencent.mobileqq,com.tencent.qqnt"
            elif [ "${{ inputs.decompile_mobileqq }}" = "true" ]; then
              FILTER="com.tencent.mobileqq"
            elif [ "${{ inputs.decompile_qqnt }}" = "true" ]; then
              FILTER="com.tencent.qqnt"
            else
              FILTER="com.tencent.mobileqq,com.tencent.qqnt"
            fi
          fi
          
          export JAVA_OPTS="-Xmx30g"
          
          set +e
          if [ -n "$FILTER" ]; then
            echo "局部反编译模式: $FILTER"
            jadx -d java_final --no-res --threads-count 1 --no-debug-info --show-only "$FILTER" dex_extracted/*.dex
          else
            echo "完整反编译模式..."
            jadx -d java_final --no-res --threads-count 2 dex_extracted/*.dex
          fi
          
          EXIT_CODE=$?
          set -e
          
          if [ $EXIT_CODE -eq 0 ] || [ $EXIT_CODE -eq 3 ]; then
            echo "JADX 运行结束，状态码: $EXIT_CODE"
          else
            echo "JADX 运行失败，退出码: $EXIT_CODE"
            exit $EXIT_CODE
          fi
          
          rm -rf dex_extracted

      # ==========================================
      # 10. 打包源码产物
      # ==========================================
      - name: Zip Decompiled Files
        if: steps.check_update.outputs.has_update == 'true'
        run: |
          cd workspace
          if [ -d "java_final" ] && [ "$(ls -A java_final)" ]; then
            mv java_final decompiled_java
            zip -r java_output.zip decompiled_java
          else
            mkdir -p decompiled_java
            echo "No package selection was made or no code was found." > decompiled_java/readme.txt
            zip -r java_output.zip decompiled_java
          fi

      # ==========================================
      # 11. 上传 Artifact 备份
      # ==========================================
      - name: Upload Decoupled Artifacts
        if: steps.check_update.outputs.has_update == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: qq-decompiled-java
          path: workspace/java_output.zip
          retention-days: 7

      # ==========================================
      # 12. 创建 GitHub Release（适配 Beta 提醒与预发布状态）
      # ==========================================
      - name: Create GitHub Release
        if: steps.check_update.outputs.has_update == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION_SHORT="${{ steps.check_update.outputs.version_short }}"
          VERSION_FULL="${{ steps.check_update.outputs.version_full }}"
          APK_URL="${{ steps.check_update.outputs.apk_url }}"
          IS_BETA="${{ steps.check_update.outputs.is_beta }}"
          
          RELEASE_TITLE="QQ Android v${VERSION_SHORT}"
          EXTRA_FLAGS=""
          BETA_NOTE=""

          # 如果检测到是 Beta 版，拼接标题、提示词和 github CLI 标记
          if [ "$IS_BETA" = "true" ]; then
            RELEASE_TITLE="QQ Android v${VERSION_SHORT} [Beta]"
            EXTRA_FLAGS="--prerelease"
            BETA_NOTE="> ⚠️ **注意：当前版本为 Telegram 频道标记的 #Beta 测试版本，请谨慎评估使用。**\n\n"
          fi

          echo "=== 正在创建 GitHub Release: ${RELEASE_TITLE} ==="
          
          gh release create "v${VERSION_SHORT}" workspace/java_output.zip \
            --title "${RELEASE_TITLE}" \
            ${EXTRA_FLAGS} \
            --notes "$(echo -e "${BETA_NOTE}### QQ Android 自动反编译产物说明

          - **应用版本：** \`${VERSION_SHORT}\`
          - **安装包文件名：** \`${VERSION_FULL}.apk\`
          - **测试版状态：** \`${IS_BETA}\`
          - **官方下载直链：** [点击从腾讯官方下载](${APK_URL})
          - **自动生成时间：** $(date -u -d '+8 hours' '+%Y-%m-%d %H:%M:%S') (北京时间)")" || \
          gh release upload "v${VERSION_SHORT}" workspace/java_output.zip --clobber
