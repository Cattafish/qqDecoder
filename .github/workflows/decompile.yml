name: Auto Decompile QQ APK

on:
  workflow_dispatch: # 支持手动点击按钮触发，并提供可选项
    inputs:
      decompile_mobileqq:
        description: '是否反编译 com.tencent.mobileqq (传统核心)'
        required: true
        type: boolean
        default: true
      decompile_qqnt:
        description: '是否反编译 com.tencent.qqnt (NT 新架构核心)'
        required: true
        type: boolean
        default: true

jobs:
  decompile:
    runs-on: ubuntu-latest

    steps:
      # ==========================================
      # 1. 优先清理磁盘空间（防止大文件溢出）
      # ==========================================
      - name: Free Disk Space (Cleanup)
        run: |
          echo "Before cleanup disk space:"
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          echo "After cleanup disk space:"
          df -h

      # ==========================================
      # 2. 基础环境准备
      # ==========================================
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download APK from Custom Link
        run: |
          mkdir -p workspace
          cd workspace
          echo "Downloading APK..."
          curl -L "https://downv6.qq.com/qqweb/QQ_1/android_apk/9.3.10_3b553a3ebc174e67.apk" -o target.apk
          echo "Download finished. File info:"
          du -sh target.apk

      # ==========================================
      # 3. 安装 JADX 工具
      # ==========================================
      - name: Install JADX
        run: |
          JADX_VERSION=$(curl -s https://api.github.com/repos/skylot/jadx/releases/latest | grep '"tag_name":' | sed -E 's/.*"v([^"]+)".*/\1/')
          curl -L "https://github.com/skylot/jadx/releases/download/v${JADX_VERSION}/jadx-${JADX_VERSION}.zip" -o jadx.zip
          unzip -d bin/jadx jadx.zip
          
          # 递归赋予 JADX 目录下所有的脚本可执行权限
          chmod -R +x bin/jadx/bin
          
          echo "$GITHUB_WORKSPACE/bin/jadx/bin" >> $GITHUB_PATH

      # ==========================================
      # 4. 单 DEX 轮询反编译并实时合并目录 (核心安全步骤)
      # ==========================================
      - name: Extract DEX files and Decompile One-by-One
        run: |
          cd workspace
          echo "Unzipping DEX files from APK..."
          unzip -q target.apk "classes*.dex" -d dex_extracted
          
          # 创建用于存放合并后 Java 代码的最终目录
          mkdir -p java_final
          
          if [ "${{ inputs.decompile_mobileqq }}" = "true" ]; then
            echo "Will extract com.tencent.mobileqq"
            mkdir -p java_final/com/tencent/mobileqq
          fi
          
          if [ "${{ inputs.decompile_qqnt }}" = "true" ]; then
            echo "Will extract com.tencent.qqnt"
            mkdir -p java_final/com/tencent/qqnt
          fi
          
          cd dex_extracted
          # 循环处理每一个解压出的 DEX 文件
          for f in classes*.dex; do
            echo "========================================="
            echo "Processing $f..."
            
            # 单个 DEX 反编译仅消耗极少内存（通常低于 1.5G），能够保障绝对不触发内存溢出
            jadx -d temp_out --no-res --threads-count 2 "$f" || echo "JADX returned warnings on $f, continuing..."
            
            # 如果勾选了 mobileqq，且存在对应目录，则进行合并
            if [ "${{ inputs.decompile_mobileqq }}" = "true" ]; then
              if [ -d "temp_out/sources/com/tencent/mobileqq" ]; then
                echo "Found com.tencent.mobileqq in $f. Merging..."
                cp -r temp_out/sources/com/tencent/mobileqq/. ../java_final/com/tencent/mobileqq/
              fi
            fi
            
            # 如果勾选了 qqnt，且存在对应目录，则进行合并
            if [ "${{ inputs.decompile_qqnt }}" = "true" ]; then
              if [ -d "temp_out/sources/com/tencent/qqnt" ]; then
                echo "Found com.tencent.qqnt in $f. Merging..."
                cp -r temp_out/sources/com/tencent/qqnt/. ../java_final/com/tencent/qqnt/
              fi
            fi
            
            # 及时删除临时反编译目录，保证服务器磁盘不会被撑满
            rm -rf temp_out
          done
          
          cd ..
          # 清理临时解出的原 dex 目录
          rm -rf dex_extracted
          echo "All selected DEX files processed and merged successfully."

      # ==========================================
      # 5. 打包与上传产物 (仅打包 Java 源码)
      # ==========================================
      - name: Zip Decompiled Files
        run: |
          cd workspace
          # 检查 java_final 目录下是否有实际生成的内容
          if [ -d "java_final" ] && [ "$(ls -A java_final)" ]; then
            echo "Zipping Java output..."
            mv java_final decompiled_java
            zip -r java_output.zip decompiled_java
          else
            echo "No files decompiled. Creating a fallback readme file."
            mkdir -p decompiled_java
            echo "No package selection was made or no code was found." > decompiled_java/readme.txt
            zip -r java_output.zip decompiled_java
          fi

      - name: Upload Decoupled Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qq-decompiled-java
          path: workspace/java_output.zip
          retention-days: 7 # 产物在 GitHub 保留 7 天
