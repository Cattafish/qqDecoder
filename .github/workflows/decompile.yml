name: Auto Decompile QQ APK

on:
  workflow_dispatch: # 支持手动点击按钮触发

jobs:
  decompile:
    runs-on: ubuntu-latest

    steps:
      # ==========================================
      # 1. 优先清理磁盘空间（放在最前面，且不破坏后续工具链）
      # ==========================================
      - name: Free Disk Space (Cleanup)
        run: |
          echo "Before cleanup disk space:"
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          echo "After cleanup disk space:"
          df -h

      # ==========================================
      # 2. 基础环境准备
      # ==========================================
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download APK from Custom Link
        # 此处链接必须用双引号包裹，防止其中的 & 符号被识别为后台运行命令
        run: |
          mkdir -p workspace
          cd workspace
          echo "Downloading APK..."
          curl -L "https://ucdl.25pp.com/fs08/2026/02/11/1/110_0ffbab8fbe0ed5f478f1024c8e798d6f.apk?yingid=web_space&packageid=206589547&did=9404fd6e4f26282890285d780583e4c8" -o target.apk
          echo "Download finished. File info:"
          du -sh target.apk

      # ==========================================
      # 3. 使用 Apktool 转换为 Smali (非常稳定，保留所有类和资源文件)
      # ==========================================
      - name: Install Apktool
        run: |
          mkdir -p bin
          curl -L "https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool" -o bin/apktool
          chmod +x bin/apktool
          
          # 自动获取最新 apktool.jar 的版本并下载
          APKTOOL_VERSION=$(curl -s https://api.github.com/repos/iBotPeaches/Apktool/releases/latest | grep '"tag_name":' | sed -E 's/.*"v([^"]+)".*/\1/')
          echo "Installing Apktool version: $APKTOOL_VERSION"
          
          # 修正链接，并使用 -f 参数
          curl -f -L "https://github.com/iBotPeaches/Apktool/releases/download/v${APKTOOL_VERSION}/apktool_${APKTOOL_VERSION}.jar" -o bin/apktool.jar
          
          echo "$GITHUB_WORKSPACE/bin" >> $GITHUB_PATH

      - name: Decompile with Apktool (Smali & Resources)
        run: |
          cd workspace
          echo "Decompiling resources and dex to smali..."
          apktool d target.apk -o decompiled_smali

      # ==========================================
      # 4. 安装 dex2jar 并物理裁剪包结构 (核心绕过步骤)
      # ==========================================
      - name: Install dex2jar
        run: |
          curl -L "https://github.com/pxb1988/dex2jar/releases/download/v2.4/dex-tools-v2.4.zip" -o dex-tools.zip
          unzip dex-tools.zip
          chmod +x dex-tools-v2.4/*.sh
          echo "$GITHUB_WORKSPACE/dex-tools-v2.4" >> $GITHUB_PATH

      - name: Convert APK to JAR and Crop Package
        run: |
          cd workspace
          echo "Converting APK to JAR..."
          d2j-dex2jar.sh -f target.apk -o full_classes.jar
          
          echo "Unzipping JAR for physical cropping..."
          mkdir -p jar_extracted
          unzip -q full_classes.jar -d jar_extracted
          
          echo "Cropping packages: removing everything except 'com/tencent/mobileqq'..."
          cd jar_extracted
          # 第一层：保留 com 目录，删除其他（如 android, androidx, kotlin, okhttp 等）
          find . -mindepth 1 -maxdepth 1 ! -name 'com' -exec rm -rf {} +
          # 第二层：保留 tencent 目录，删除其他
          cd com
          find . -mindepth 1 -maxdepth 1 ! -name 'tencent' -exec rm -rf {} +
          # 第三层：保留 mobileqq 目录，删除其他
          cd tencent
          find . -mindepth 1 -maxdepth 1 ! -name 'mobileqq' -exec rm -rf {} +
          cd ../..
          
          echo "Zipping the cropped directory back to a filtered JAR..."
          zip -q -r ../filtered.jar .
          cd ..
          echo "Secondary crop completed."

      # ==========================================
      # 5. 安装 JADX 并反编译裁剪后的精简 JAR 包 (安全高效)
      # ==========================================
      - name: Install JADX
        run: |
          JADX_VERSION=$(curl -s https://api.github.com/repos/skylot/jadx/releases/latest | grep '"tag_name":' | sed -E 's/.*"v([^"]+)".*/\1/')
          curl -L "https://github.com/skylot/jadx/releases/download/v${JADX_VERSION}/jadx-${JADX_VERSION}.zip" -o jadx.zip
          unzip -d bin/jadx jadx.zip
          
          # 递归赋予 JADX 目录下所有的脚本可执行权限
          chmod -R +x bin/jadx/bin
          
          echo "$GITHUB_WORKSPACE/bin/jadx/bin" >> $GITHUB_PATH

      - name: Decompile with JADX (Filtered JAR to Java)
        # 此时 JADX 面对的是一个极度精简的 filtered.jar，5.5G 堆内存能以极快的速度安全跑完
        env:
          JAVA_OPTS: "-Xmx5500m"
        run: |
          cd workspace
          echo "Decompiling cropped JAR to Java..."
          jadx -d decompiled_java --no-res --threads-count 1 filtered.jar || echo "JADX encountered warning/errors, continuing..."

      # ==========================================
      # 6. 打包与上传产物
      # ==========================================
      - name: Zip Decompiled Files
        run: |
          cd workspace
          if [ -d "decompiled_smali" ]; then
            echo "Zipping Smali output..."
            zip -r smali_output.zip decompiled_smali
          fi
          if [ -d "decompiled_java" ]; then
            echo "Zipping Java output..."
            zip -r java_output.zip decompiled_java
          fi

      - name: Upload Decoupled Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qq-decompiled-results
          path: |
            workspace/smali_output.zip
            workspace/java_output.zip
          retention-days: 7 # 产物在 GitHub 保留 7 天
